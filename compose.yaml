name: search

services:
  #  frontend:
  #    container_name: wretch
  #    build:
  #      context: ./frontend
  #      dockerfile: Dockerfile.web
  #    ports:
  #      - "3000:3000"
  #    depends_on:
  #      - backend

  backend:
    container_name: scum
    build:
      context: ./backend
      dockerfile: Dockerfile.server
    init: true
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src/main/resources/config.properties:/app/config.properties
      - ./backend/data/ingest:/app/bind
      - csv_data:/app/data
    depends_on:
      - db
      - redis1

  db:
    container_name: mongrel
    image: mongo:8.3
    logging:
      driver: "none"
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb

  redis1:
    container_name: vermin
    image: redis:8.8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data1:/data

